<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password | Rewire</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #000; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 600; }
        button:disabled { background-color: #ccc; }
        #success-state { display: none; }
        .store-button { display: inline-block; margin-top: 10px; padding: 12px 20px; background: #000; color: white; text-decoration: none; border-radius: 6px; width: 90%; font-weight: 600; }
        .email-display { font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div class="card" id="form-state">
        <h1>Set your password</h1>
        <p>Setting password for: <span id="user-email" class="email-display">your account</span></p>
        
        <input type="password" id="new-password" placeholder="New Password (min 6 chars)" required>
        <button id="save-btn" onclick="handlePasswordUpdate()">Save Password</button>
        <p id="error-msg" style="color: #ff4d4d; margin-top: 10px; display: none;"></p>
    </div>

    <div class="card" id="success-state">
        <h1>Welcome to Rewire!</h1>
        <p>Your password has been set successfully.</p>
        <p><strong>Final Step:</strong> Download the app and log in using the email shown above.</p>
        
        <a href="#" class="store-button">Download for iOS</a>
        <div style="margin: 8px 0;"></div>
        <a href="#" class="store-button">Download for Android</a>
    </div>

    <script>
        // 1. Smoothly grab the email from the URL to remind the user
        const hash = window.location.hash;
        if (hash && hash.includes('email=')) {
            const email = hash.split('email=')[1];
            document.getElementById('user-email').innerText = decodeURIComponent(email);
        }

        // 2. Supabase Configuration
        const supabaseUrl = 'https://qmyjzsujfwmxscxdsvjh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFteWp6c3VqZndteHNjeGRzdmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NzkyNTQsImV4cCI6MjA4NjU1NTI1NH0.n-BO_BTAzGl8V2uachXbGWWn2p3woozW21gp_unP-28';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // 3. Password Logic
        async function handlePasswordUpdate() {
            const password = document.getElementById('new-password').value;
            const btn = document.getElementById('save-btn');
            const errorMsg = document.getElementById('error-msg');

            if (password.length < 6) {
                errorMsg.innerText = "Password must be at least 6 characters.";
                errorMsg.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Saving...";
            errorMsg.style.display = "none";

            const { error } = await supabaseClient.auth.updateUser({ password: password });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Save Password";
            } else {
                document.getElementById('form-state').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
            }
        }
    </script>
</body>
</html>
